name: Store Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Main commit or tag to validate
        required: true
        type: string

jobs:
  store-candidate:
    name: Store candidate checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Verify selected ref is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main
      - name: Check repository safety
        run: scripts/ci/forbidden-files.sh
      - name: Check store documents exist
        run: test -f docs/store-submission/checklist.md
      - name: Placeholder until Unity bootstrap
        run: echo "Run signed production build and store-readiness checks here."
