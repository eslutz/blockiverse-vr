name: PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check shell script syntax
        run: bash -n scripts/ci/forbidden-files.sh scripts/unity/*.sh
      - name: Check forbidden files
        run: scripts/ci/forbidden-files.sh
      - name: Check release policy docs
        run: test -f docs/architecture/branching-and-release.md
