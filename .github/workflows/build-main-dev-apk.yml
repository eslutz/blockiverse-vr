name: Main Development APK

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-dev-apk:
    name: Build development APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check forbidden files
        run: scripts/ci/forbidden-files.sh
      - name: Detect Unity project
        id: unity
        run: |
          if [ -f ProjectSettings/ProjectVersion.txt ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare artifact directory
        run: mkdir -p .ci-artifacts/dev-apk
      - name: Placeholder until Unity bootstrap
        if: steps.unity.outputs.exists == 'false'
        run: |
          {
            echo "Unity project not bootstrapped yet."
            echo "Development APK build will be enabled after EPIC-01 creates ProjectSettings/ProjectVersion.txt."
          } > .ci-artifacts/dev-apk/unity-not-bootstrapped.txt
      - name: Build development APK
        if: steps.unity.outputs.exists == 'true'
        run: |
          {
            echo "Build unsigned or debug-signed Quest development APK here."
            echo "Expected output path: .ci-artifacts/dev-apk/blockiverse-vr-development.apk"
          } > .ci-artifacts/dev-apk/development-apk-build-plan.txt
      - name: Upload development APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: development-apk
          path: .ci-artifacts/dev-apk/
          if-no-files-found: error
