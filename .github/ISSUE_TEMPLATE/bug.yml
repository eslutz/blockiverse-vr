name: Bug
description: Report broken behavior.
title: "BUG: "
labels: ["type: bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test plan
  - type: textarea
    id: validation
    attributes:
      label: Manual validation steps
